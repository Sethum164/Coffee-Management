<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Manage Categories | CateringPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="admin-shell">
  <div th:replace="~{fragments/admin-sidebar :: sidebar('categories')}"></div>

  <div class="admin-content">
    <h2>Categories</h2>

    <div style="display:flex; gap:30px; flex-wrap:wrap;">
      <table style="flex:1.4; min-width:320px;">
        <thead><tr><th>Name</th><th>Description</th></tr></thead>
        <tbody>
        <tr th:each="cat : ${categories}">
          <td th:text="${cat.name}">Name</td>
          <td th:text="${cat.description}">Description</td>
        </tr>
        </tbody>
      </table>

      <form th:action="@{/admin/categories/save}" th:object="${category}" method="post" class="summary-box" style="flex:1; min-width:280px; align-self:flex-start;">
        <h3 style="margin-top:0;">Add Category</h3>
        <div class="form-group">
          <label>Name</label>
          <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Save Category</button>
      </form>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
