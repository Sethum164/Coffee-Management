spring.application.name=Catering Ordering System

# ---- H2 in-memory database (default, zero setup) ----
spring.datasource.url=jdbc:h2:mem:cateringdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- To use MySQL instead, comment the H2 block above and use this ----
# spring.datasource.url=jdbc:mysql://localhost:3306/catering_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

spring.thymeleaf.cache=false

server.port=8080
