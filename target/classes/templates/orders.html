<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Orders | CateringPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<section class="section">
  <div class="container" style="max-width:900px;">
    <h2 class="section-title">My Orders</h2>

    <div th:if="${orders.isEmpty()}" class="empty-state">
      <h3>No orders yet</h3>
      <p>Your placed orders will show up here.</p>
      <a href="/menu" class="btn btn-primary" style="margin-top:14px;">Browse Menu</a>
    </div>

    <table th:if="${!orders.isEmpty()}">
      <thead>
      <tr><th>Order #</th><th>Date Placed</th><th>Event Date</th><th>Total</th><th>Status</th><th>Payment</th><th></th></tr>
      </thead>
      <tbody>
      <tr th:each="order : ${orders}">
        <td th:text="'#' + ${order.id}">#1</td>
        <td th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}">Date</td>
        <td th:text="${#temporals.format(order.eventDate, 'dd MMM yyyy, hh:mm a')}">Date</td>
        <td th:text="'Rs. ' + ${order.totalAmount}">Rs. 0</td>
        <td><span class="status" th:class="'status status-' + ${order.status}" th:text="${order.status}">PENDING</span></td>
        <td><span class="payment-status" th:class="'payment-status payment-status-' + ${order.paymentStatus}" th:text="${order.paymentStatus}">PENDING</span></td>
        <td><a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-secondary btn-sm">View</a></td>
      </tr>
      </tbody>
    </table>
  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
