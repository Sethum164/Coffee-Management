<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login | CateringPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<section class="section">
  <div class="form-card">
    <h2>Welcome Back</h2>
    <p class="sub">Log in to order from our catering menu</p>

    <div class="alert alert-success" th:if="${registered}">Registration successful! Please log in.</div>
    <div class="alert alert-error" th:if="${param.error}">Invalid username or password.</div>
    <div class="alert alert-success" th:if="${param.logout}">You have been logged out.</div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <p style="text-align:center; margin-top:18px; font-size:.9rem;">
      Don't have an account? <a href="/register">Sign up</a>
    </p>
    <p style="text-align:center; margin-top:8px; font-size:.78rem; color:var(--gray);">
      Demo admin: admin / admin123 &nbsp;|&nbsp; Demo customer: jane / customer123
    </p>
  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
