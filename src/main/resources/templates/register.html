<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | CateringPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<section class="section">
  <div class="form-card">
    <h2>Create Account</h2>
    <p class="sub">Sign up to start ordering catering for your events</p>

    <form th:action="@{/register}" th:object="${user}" method="post">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" th:field="*{fullName}" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" th:field="*{username}" class="form-control" required>
        <div class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" th:field="*{email}" class="form-control" required>
        <div class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" th:field="*{password}" class="form-control" required>
        <div class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="text" th:field="*{phone}" class="form-control">
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" th:field="*{address}" class="form-control">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>
    <p style="text-align:center; margin-top:18px; font-size:.9rem;">
      Already have an account? <a href="/login">Log in</a>
    </p>
  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
