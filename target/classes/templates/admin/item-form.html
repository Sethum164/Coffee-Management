<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Item Form | CateringPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="admin-shell">
  <div th:replace="~{fragments/admin-sidebar :: sidebar('items')}"></div>

  <div class="admin-content">
    <h2 th:text="${item.id == null} ? 'Add New Item' : 'Edit Item'">Item Form</h2>

    <form th:action="@{/admin/items/save}" th:object="${item}" method="post" class="summary-box" style="max-width:560px;">
      <input type="hidden" th:field="*{id}">

      <div class="form-group">
        <label>Name</label>
        <input type="text" th:field="*{name}" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (Rs.)</label>
          <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select name="categoryId" class="form-control">
            <option value="">-- Select --</option>
            <option th:each="cat : ${categories}" th:value="${cat.id}"
                    th:selected="${item.category != null and item.category.id == cat.id}"
                    th:text="${cat.name}">Category</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label><input type="checkbox" th:field="*{available}"> Available</label>
        </div>
        <div class="form-group">
          <label><input type="checkbox" th:field="*{vegetarian}"> Vegetarian</label>
        </div>
        <div class="form-group">
          <label><input type="checkbox" th:field="*{featured}"> Featured</label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Save Item</button>
    </form>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
